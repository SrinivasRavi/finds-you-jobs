[filters.title]
# Software Engineer aliases — the maintainer's complete valid-title list
# (2026-07-07). Word-boundary + no-gap-word matching (filters.py) means each
# multi-word variant must be listed explicitly: "software engineer" does NOT
# match "Software Development Engineer" (the "development" gap word breaks
# adjacency). The bare "developer"/"programmer"/"coder" terms subsume every
# *Developer/*Programmer variant, but the full list is kept verbatim so the
# config is auditable against the maintainer's spec. Broad by design — this
# targets Amazon-class ("SDE") and every SE-equivalent title, not just "SWE".
# "forward deployed" (not "...engineer") also catches "Forward Deployed
# Software Engineer".
allow = [
    "software engineer", "software developer", "software development engineer",
    "sde", "software programmer", "software developer engineer",
    "software design engineer", "software specialist", "software consultant",
    "software analyst", "application developer", "application engineer",
    "application software engineer", "application programmer",
    "software application developer", "software application engineer",
    "software solutions engineer", "software solutions developer",
    "software solutions architect", "software systems engineer",
    "software systems developer", "software systems analyst",
    "systems software engineer", "systems engineer",
    "computer software engineer", "computer programmer",
    "developer", "programmer", "coder",
    "backend engineer", "forward deployed engineer", "forward deployed",
]
block = []

[filters.location]
# Remote boards say "Worldwide" / "Anywhere in the World" — first-run eyeball
# caught those missing from the allow list. US-only remote roles dominate the
# raw feed and are unusable from India, so US variants are blocked;
# always_allow rescues any "US or India" multi-location posting past the block
# (the career-ops always_allow semantics, exercised for real here).
# 2026-07-07 registry-scan audit correction: bare hub-city rows without a
# literal "India" token were dropped (MongoDB @ Gurugram, Shield AI @ New
# Delhi) — India hub cities appended to allow + always_allow. "delhi"
# word-matches inside "New Delhi" (filters.py word-boundary matcher).
allow = [
    "india", "mumbai", "pune", "bengaluru", "bangalore",
    "remote", "worldwide", "anywhere", "global",
    "hyderabad", "chennai", "gurugram", "gurgaon", "delhi",
    "noida", "kolkata", "ahmedabad", "kochi",
]
block = ["us", "usa", "united states"]
always_allow = [
    "india", "mumbai", "pune", "bengaluru", "bangalore",
    "hyderabad", "chennai", "gurugram", "gurgaon", "delhi",
    "noida", "kolkata", "ahmedabad", "kochi",
]

[scan]
max_age_days = 0
per_source_cap = 0
timeout_s = 30

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Apply — Senior Widget Engineer at Globex</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input, textarea, select { display: block; margin-top: 0.25rem; width: 100%; }
    fieldset { margin-top: 1rem; }
    iframe { width: 100%; height: 120px; margin-top: 1rem; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Apply for Senior Widget Engineer</h1>
  <form id="application" action="#" method="post">
    <label for="full_name">Full name</label>
    <input id="full_name" name="full_name" type="text" required />

    <label for="email">Email address</label>
    <input id="email" name="email" type="email" required />

    <label for="cover_letter">Cover letter</label>
    <textarea id="cover_letter" name="cover_letter" rows="4"></textarea>

    <label for="source">How did you hear about us?</label>
    <select id="source" name="source">
      <option value="">Select one</option>
      <option value="li">LinkedIn</option>
      <option value="referral">A referral</option>
      <option value="search">Web search</option>
    </select>

    <fieldset>
      <legend>Are you authorized to work in this country?</legend>
      <label for="auth_yes">Yes, I am authorized</label>
      <input id="auth_yes" name="work_auth" type="radio" value="yes" />
      <label for="auth_no">No, I require sponsorship</label>
      <input id="auth_no" name="work_auth" type="radio" value="no" />
    </fieldset>

    <label for="relocate">Willing to relocate</label>
    <input id="relocate" name="relocate" type="checkbox" />

    <label for="resume">Resume upload</label>
    <input id="resume" name="resume" type="file" />

    <iframe id="portfolio-frame" title="Portfolio details" srcdoc="
      &lt;!DOCTYPE html&gt;
      &lt;html&gt;&lt;body&gt;
        &lt;label for=&quot;portfolio_url&quot;&gt;Portfolio URL&lt;/label&gt;
        &lt;input id=&quot;portfolio_url&quot; name=&quot;portfolio_url&quot; type=&quot;url&quot; /&gt;
      &lt;/body&gt;&lt;/html&gt;
    "></iframe>

    <button type="submit">Submit application</button>
  </form>
</body>
</html>

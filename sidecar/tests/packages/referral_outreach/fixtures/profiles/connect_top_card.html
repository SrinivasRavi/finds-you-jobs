<!doctype html>
<!-- Connect-primary layout: a matching SDUI top-card wrapper with a primary
     Connect button. `_action_scope` finds the top card and the direct probe wins. -->
<html>
  <head><meta charset="utf-8" /><title>Jane Doe</title></head>
  <body>
    <nav><button aria-label="Message messaging">Messaging</button></nav>
    <main>
      <section componentkey="com.linkedin.sdui.profile.card.TopCard">
        <h1>Jane Doe</h1>
        <div class="pvs-profile-actions">
          <button aria-label="Invite Jane Doe to connect"><span>Connect</span></button>
          <button aria-label="More actions"><span>More</span></button>
        </div>
      </section>
    </main>
  </body>
</html>
